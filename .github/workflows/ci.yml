name: CI

# Runs on every push + PR to catch regressions before they hit production.
#
# What this catches:
# - Any of the 1,479 unit tests fail → PR blocked
# - scripts/audit_config_defaults.py finds an undefined config key → PR blocked
# - Syntax error / import failure → PR blocked
#
# What this does NOT catch (by design):
# - Live TopstepX integration tests (would need secrets, credentials in CI
#   are a security risk for a trading system). Run manually before deploys:
#     TOPSTEPX_INTEGRATION=1 pytest tests/test_topstepx_live_contract.py -v
# - Performance regressions in backtester (too slow for every PR).

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

# Cancel older runs on the same branch if a new push lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit tests + config audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Skip CI on pure docs commits (commit msg or changed files).
    if: |
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !contains(github.event.head_commit.message, '[ci skip]')

    defaults:
      run:
        working-directory: algoict-engine

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'algoict-engine/requirements.txt'

      - name: Install system deps (TA-Lib C library)
        # 2026-04-24: switched from building v0.4.0 source (which broke on
        # Ubuntu 24.04 runners — autoconf chain failures, opaque error)
        # to the official prebuilt v0.6.4 .deb package. Faster (~3s vs
        # ~2min compile) AND deterministic — the deb is signed.
        # Reference: https://github.com/ta-lib/ta-lib/releases
        run: |
          wget -q https://github.com/ta-lib/ta-lib/releases/download/v0.6.4/ta-lib_0.6.4_amd64.deb
          sudo dpkg -i ta-lib_0.6.4_amd64.deb
          sudo ldconfig
        working-directory: /tmp

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Config drift scanner (scripts/audit_config_defaults.py)
        # Exit code 1 if any `getattr(config, X, default)` or `config.cfg(X, default)`
        # uses a key not defined in config.py — catches silent drift.
        run: python scripts/audit_config_defaults.py

      - name: Run unit tests
        # Skip:
        # - test_strategy_lab.py (runs Claude API calls — needs ANTHROPIC_API_KEY)
        # - test_topstepx_live_contract.py (needs TOPSTEPX credentials)
        env:
          # Provide harmless dummies for anything that reads .env at import
          TOPSTEPX_USERNAME: ci-dummy
          TOPSTEPX_API_KEY: ci-dummy
          TOPSTEPX_API_URL: https://example.invalid/api
          TOPSTEPX_WS_URL: wss://example.invalid/ws
          TELEGRAM_BOT_TOKEN: ci-dummy-token
          TELEGRAM_CHAT_ID: '0'
          SUPABASE_URL: https://example.invalid
          SUPABASE_KEY: ci-dummy
          ANTHROPIC_API_KEY: ci-dummy
        run: |
          python -m pytest tests/ -v \
            --ignore=tests/test_strategy_lab.py \
            --ignore=tests/test_topstepx_live_contract.py \
            --maxfail=5

      - name: Smoke-import main + key modules
        # Catches syntax errors / missing imports that tests might miss
        # (e.g. a bare `except:` somewhere keeps tests green but breaks launch).
        env:
          TOPSTEPX_USERNAME: ci-dummy
          TOPSTEPX_API_KEY: ci-dummy
          TELEGRAM_BOT_TOKEN: ci-dummy
          TELEGRAM_CHAT_ID: '0'
          SUPABASE_URL: https://example.invalid
          SUPABASE_KEY: ci-dummy
          ANTHROPIC_API_KEY: ci-dummy
        run: |
          python -c "
          import main, config
          import brokers.topstepx, risk.risk_manager
          import strategies.silver_bullet, strategies.ny_am_reversal
          import detectors.market_structure, detectors.fair_value_gap
          import detectors.order_block, detectors.liquidity, detectors.displacement
          import detectors.swing_points, detectors.confluence
          import alerts.telegram_bot, db.supabase_client
          import core.health
          print('All critical modules import OK.')
          "
